version: "3.9"

services:
  latex-compiler:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: briefly-latex-compiler
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
    restart: unless-stopped
    # /tmp needs to be writable for pdflatex temp files
    tmpfs:
      - /tmp:size=256m,mode=1777
    # Resource limits — pdflatex can be CPU-intensive
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 512M
        reservations:
          memory: 128M
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000/health', r => process.exit(r.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
